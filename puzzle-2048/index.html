<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Number Puzzle Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        .game-title {
            font-size: 4em;
            font-weight: 900;
            color: #786e5f;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1em;
            color: #786e5f;
            margin-bottom: 30px;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px 30px;
            color: white;
            min-width: 120px;
        }

        .score-label {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
        }

        .game-board-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: #bbada0;
            border-radius: 10px;
            position: relative;
        }

        .tile {
            width: 110px;
            height: 110px;
            background: #cdc1b4;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #786e5f;
            transition: all 0.15s ease-in-out;
        }

        .tile-2 { background: #eee4da; color: #786e5f; }
        .tile-4 { background: #ede0c8; color: #786e5f; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 2em; }
        .tile-256 { background: #edcc61; color: white; font-size: 2em; }
        .tile-512 { background: #edc850; color: white; font-size: 2em; }
        .tile-1024 { background: #edc53f; color: white; font-size: 1.7em; }
        .tile-2048 { background: #edc22e; color: white; font-size: 1.7em; box-shadow: 0 0 30px #edc22e; }

        .tile.new {
            animation: appear 0.2s ease-in-out;
        }

        .tile.merged {
            animation: merge 0.2s ease-in-out;
        }

        @keyframes appear {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }

        .btn-new {
            background: #8f7a66;
            color: white;
        }

        .btn-new:hover {
            background: #9f8a76;
            transform: translateY(-2px);
        }

        .btn-back {
            background: #786e5f;
            color: white;
        }

        .btn-back:hover {
            background: #887e6f;
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 20px;
            color: #786e5f;
            font-size: 1em;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.95);
            border-radius: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .game-over-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .game-over-text {
            font-size: 3em;
            font-weight: bold;
            color: #786e5f;
            margin-bottom: 20px;
        }

        .game-over-message {
            font-size: 1.3em;
            color: #786e5f;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .tile {
                width: 70px;
                height: 70px;
                font-size: 1.8em;
            }

            .tile-128, .tile-256, .tile-512 {
                font-size: 1.4em;
            }

            .tile-1024, .tile-2048 {
                font-size: 1.2em;
            }

            .game-title {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">2048</h1>
        <p class="subtitle">Join the numbers and get to the 2048 tile!</p>

        <div class="score-container">
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="scoreValue">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">BEST</div>
                <div class="score-value" id="bestValue">0</div>
            </div>
        </div>

        <div class="game-board-container">
            <div class="game-board" id="gameBoard">
                <!-- Grid cells will be generated here -->
            </div>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text" id="gameOverText">Game Over!</div>
                <div class="game-over-message">No more moves available</div>
                <button class="btn btn-new" onclick="newGame()">Try Again</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-new" onclick="newGame()">New Game</button>
            <button class="btn btn-back" onclick="location.href='../index.html'">Back</button>
        </div>

        <div class="instructions">
            <strong>HOW TO PLAY:</strong> Use arrow keys to move tiles. When two tiles with the same number touch, they merge into one!
        </div>
    </div>

    <script>
        const gridSize = 4;
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048Best') || 0;
        let moved = false;

        document.getElementById('bestValue').textContent = bestScore;

        function initGrid() {
            grid = [];
            for (let i = 0; i < gridSize; i++) {
                grid[i] = [];
                for (let j = 0; j < gridSize; j++) {
                    grid[i][j] = 0;
                }
            }
        }

        function newGame() {
            initGrid();
            score = 0;
            document.getElementById('scoreValue').textContent = '0';
            document.getElementById('gameOverOverlay').classList.remove('show');
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({row: i, col: j});
                    }
                }
            }

            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateBoard() {
            const boardElement = document.getElementById('gameBoard');
            boardElement.innerHTML = '';

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const tileValue = grid[i][j];
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    if (tileValue > 0) {
                        tile.textContent = tileValue;
                        tile.classList.add(`tile-${tileValue}`);
                    }

                    boardElement.appendChild(tile);
                }
            }
        }

        function move(direction) {
            moved = false;
            const oldGrid = JSON.stringify(grid);

            if (direction === 'left') {
                for (let i = 0; i < gridSize; i++) {
                    grid[i] = slideAndMerge(grid[i]);
                }
            } else if (direction === 'right') {
                for (let i = 0; i < gridSize; i++) {
                    grid[i] = slideAndMerge(grid[i].reverse()).reverse();
                }
            } else if (direction === 'up') {
                for (let j = 0; j < gridSize; j++) {
                    let column = [];
                    for (let i = 0; i < gridSize; i++) {
                        column.push(grid[i][j]);
                    }
                    column = slideAndMerge(column);
                    for (let i = 0; i < gridSize; i++) {
                        grid[i][j] = column[i];
                    }
                }
            } else if (direction === 'down') {
                for (let j = 0; j < gridSize; j++) {
                    let column = [];
                    for (let i = 0; i < gridSize; i++) {
                        column.push(grid[i][j]);
                    }
                    column = slideAndMerge(column.reverse()).reverse();
                    for (let i = 0; i < gridSize; i++) {
                        grid[i][j] = column[i];
                    }
                }
            }

            if (oldGrid !== JSON.stringify(grid)) {
                moved = true;
                addRandomTile();
                updateBoard();
                updateScore();

                if (checkWin()) {
                    setTimeout(() => {
                        document.getElementById('gameOverText').textContent = 'You Win! 🎉';
                        document.getElementById('gameOverOverlay').classList.add('show');
                    }, 300);
                } else if (checkGameOver()) {
                    setTimeout(() => {
                        document.getElementById('gameOverText').textContent = 'Game Over!';
                        document.getElementById('gameOverOverlay').classList.add('show');
                    }, 300);
                }
            }
        }

        function slideAndMerge(row) {
            // Remove zeros
            let newRow = row.filter(val => val !== 0);

            // Merge adjacent equal values
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] === newRow[i + 1]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow.splice(i + 1, 1);
                }
            }

            // Fill with zeros
            while (newRow.length < gridSize) {
                newRow.push(0);
            }

            return newRow;
        }

        function updateScore() {
            document.getElementById('scoreValue').textContent = score;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048Best', bestScore);
                document.getElementById('bestValue').textContent = bestScore;
            }
        }

        function checkWin() {
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === 2048) {
                        return true;
                    }
                }
            }
            return false;
        }

        function checkGameOver() {
            // Check for empty cells
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === 0) {
                        return false;
                    }
                }
            }

            // Check for possible merges horizontally
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize - 1; j++) {
                    if (grid[i][j] === grid[i][j + 1]) {
                        return false;
                    }
                }
            }

            // Check for possible merges vertically
            for (let i = 0; i < gridSize - 1; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === grid[i + 1][j]) {
                        return false;
                    }
                }
            }

            return true;
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                move('left');
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                move('right');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                move('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                move('down');
            }
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 50) {
                    move(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > 50) {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
        });

        // Start new game
        newGame();
    </script>
</body>
</html>
