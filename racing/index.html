<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Racer - High Speed Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            position: relative;
        }

        #gameCanvas {
            background: linear-gradient(180deg, #1a0a2e 0%, #0a0a1e 100%);
            border-radius: 0;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
            display: block;
            border: 3px solid #ff6b6b;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-display {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff88;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            min-width: 150px;
        }

        .stat-label {
            font-size: 0.7em;
            color: #888;
            display: block;
            margin-bottom: 5px;
        }

        .speed-meter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #ff6b6b;
            border-radius: 15px;
            padding: 15px 30px;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .speed-value {
            font-size: 3em;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
            font-weight: bold;
        }

        .speed-unit {
            font-size: 1.5em;
            color: #888;
        }

        .game-over-screen, .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95);
            border: 3px solid #ff6b6b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.8);
            display: none;
            z-index: 20;
            min-width: 400px;
        }

        .game-over-screen.show, .start-screen.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .screen-title {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #00ff88);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .game-description {
            color: #888;
            font-size: 1.1em;
            margin: 20px 0;
            line-height: 1.6;
        }

        .controls-hint {
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid #ff6b6b;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            color: #aaa;
        }

        .controls-hint div {
            margin: 8px 0;
        }

        .final-stats {
            margin: 20px 0;
        }

        .final-stat {
            font-size: 1.5em;
            margin: 15px 0;
            color: #fff;
        }

        .stat-value-final {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-weight: bold;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.3em;
            border: 3px solid;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: #000;
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .btn-start:hover {
            box-shadow: 0 0 40px rgba(255, 107, 107, 1);
            transform: scale(1.05);
        }

        .btn-home {
            background: transparent;
            color: #00d4ff;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn-home:hover {
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
        }

        .instructions {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #feca57;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.1em;
            color: #feca57;
            text-shadow: 0 0 10px #feca57;
            animation: instructionPulse 2s ease-in-out infinite;
        }

        @keyframes instructionPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .instructions.hide {
            display: none;
        }

        @media (max-width: 768px) {
            .ui-overlay {
                flex-direction: column;
                gap: 10px;
            }

            .stat-display {
                font-size: 1em;
                min-width: 120px;
            }

            .speed-value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="ui-overlay">
            <div class="stat-display">
                <span class="stat-label">DISTANCE</span>
                <span id="distanceText">0m</span>
            </div>
            <div class="stat-display">
                <span class="stat-label">SCORE</span>
                <span id="scoreText">0</span>
            </div>
            <div class="stat-display" style="border-color: #feca57; color: #feca57; text-shadow: 0 0 10px #feca57;">
                <span class="stat-label">COINS</span>
                <span id="coinsText">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="800"></canvas>

        <div class="speed-meter">
            <span class="speed-value" id="speedValue">0</span>
            <span class="speed-unit">KM/H</span>
        </div>

        <div class="instructions" id="instructions">
            ← → ARROW KEYS or A/D to STEER
        </div>

        <div class="start-screen show" id="startScreen">
            <div class="screen-title">NEON RACER</div>
            <p class="game-description">
                High-speed arcade racing!<br>
                Dodge traffic, collect coins, beat your record!
            </p>
            <div class="controls-hint">
                <div><strong>🎮 CONTROLS:</strong></div>
                <div>← → Arrow Keys / A D - Steer</div>
                <div>↑ W - Accelerate</div>
                <div>↓ S - Brake</div>
            </div>
            <button class="btn btn-start" onclick="startGame()">▶ START</button>
            <button class="btn btn-home" onclick="location.href='../index.html'">← BACK</button>
        </div>

        <div class="game-over-screen" id="gameOverScreen">
            <div class="screen-title">RACE OVER</div>
            <div class="final-stats">
                <div class="final-stat">
                    Distance: <span class="stat-value-final" id="finalDistance">0m</span>
                </div>
                <div class="final-stat">
                    Score: <span class="stat-value-final" id="finalScore">0</span>
                </div>
                <div class="final-stat">
                    Coins: <span class="stat-value-final" id="finalCoins">0</span>
                </div>
                <div class="final-stat" style="margin-top: 20px; color: #ff6b6b;">
                    Best: <span id="bestDistance">0m</span>
                </div>
            </div>
            <button class="btn btn-start" onclick="restartGame()">↻ RETRY</button>
            <button class="btn btn-home" onclick="location.href='../index.html'">← BACK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameState = 'start';
        let distance = 0;
        let score = 0;
        let coins = 0;
        let speed = 0;
        let targetSpeed = 0;
        let bestDistance = localStorage.getItem('racerBest') || 0;

        // Player car
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 150,
            width: 40,
            height: 70,
            speed: 0,
            lane: 2 // 0-4 lanes
        };

        // Road
        const roadWidth = 400;
        const roadX = (canvas.width - roadWidth) / 2;
        let roadOffset = 0;
        const laneWidth = roadWidth / 5;

        // Traffic and items
        let traffic = [];
        let items = [];
        let spawnTimer = 0;

        // Road lines for animation
        let roadLines = [];
        for (let i = 0; i < 20; i++) {
            roadLines.push({
                y: i * 50,
                lane: Math.floor(Math.random() * 4)
            });
        }

        function startGame() {
            gameState = 'playing';
            distance = 0;
            score = 0;
            coins = 0;
            speed = 50;
            targetSpeed = 50;
            player.x = canvas.width / 2;
            player.lane = 2;
            traffic = [];
            items = [];
            spawnTimer = 0;

            document.getElementById('startScreen').classList.remove('show');
            document.getElementById('instructions').classList.remove('hide');
            updateUI();
            gameLoop();
        }

        function gameLoop() {
            if (gameState === 'playing') {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            // Smooth speed change
            speed += (targetSpeed - speed) * 0.05;

            // Update distance
            distance += speed * 0.016;
            score = Math.floor(distance);

            // Increase difficulty over time
            targetSpeed = Math.min(200, 50 + distance * 0.01);

            // Update road animation
            roadOffset += speed * 0.5;
            if (roadOffset > 50) roadOffset = 0;

            roadLines.forEach(line => {
                line.y += speed * 0.5;
                if (line.y > canvas.height) {
                    line.y = -50;
                    line.lane = Math.floor(Math.random() * 4);
                }
            });

            // Spawn traffic
            spawnTimer++;
            if (spawnTimer > Math.max(30, 90 - distance * 0.01)) {
                spawnTimer = 0;

                const type = Math.random();
                if (type < 0.7) {
                    // Spawn traffic car
                    const lane = Math.floor(Math.random() * 5);
                    traffic.push({
                        x: roadX + lane * laneWidth + laneWidth / 2,
                        y: -80,
                        width: 35,
                        height: 60,
                        speed: Math.random() * 30 + 40,
                        color: ['#ff0088', '#00d4ff', '#8a2be2', '#feca57'][Math.floor(Math.random() * 4)]
                    });
                } else {
                    // Spawn coin
                    const lane = Math.floor(Math.random() * 5);
                    items.push({
                        x: roadX + lane * laneWidth + laneWidth / 2,
                        y: -30,
                        type: 'coin',
                        collected: false
                    });
                }
            }

            // Update traffic
            traffic.forEach((car, i) => {
                car.y += speed * 0.5 - car.speed * 0.3;

                // Remove off-screen cars
                if (car.y > canvas.height + 100) {
                    traffic.splice(i, 1);
                }

                // Collision detection
                if (checkCollision(player, car)) {
                    gameOver();
                }
            });

            // Update items
            items.forEach((item, i) => {
                item.y += speed * 0.5;

                if (item.y > canvas.height + 50) {
                    items.splice(i, 1);
                }

                // Collect coins
                if (!item.collected && checkCollision(player, {
                    x: item.x,
                    y: item.y,
                    width: 30,
                    height: 30
                })) {
                    item.collected = true;
                    coins++;
                    score += 100;
                    items.splice(i, 1);
                }
            });

            updateUI();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grass
            ctx.fillStyle = '#1a5c1a';
            ctx.fillRect(0, 0, roadX, canvas.height);
            ctx.fillRect(roadX + roadWidth, 0, canvas.width - roadX - roadWidth, canvas.height);

            // Draw road
            const gradient = ctx.createLinearGradient(roadX, 0, roadX + roadWidth, 0);
            gradient.addColorStop(0, '#2a2a3a');
            gradient.addColorStop(0.5, '#3a3a4a');
            gradient.addColorStop(1, '#2a2a3a');
            ctx.fillStyle = gradient;
            ctx.fillRect(roadX, 0, roadWidth, canvas.height);

            // Draw road lines
            ctx.strokeStyle = '#feca57';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 20]);

            roadLines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(roadX + (line.lane + 1) * laneWidth, line.y);
                ctx.lineTo(roadX + (line.lane + 1) * laneWidth, line.y + 30);
                ctx.stroke();
            });

            ctx.setLineDash([]);

            // Draw road borders
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 8;
            ctx.strokeRect(roadX, 0, roadWidth, canvas.height);

            // Draw traffic
            traffic.forEach(car => {
                drawCar(car.x, car.y, car.width, car.height, car.color);
            });

            // Draw coins
            items.forEach(item => {
                if (item.type === 'coin') {
                    drawCoin(item.x, item.y);
                }
            });

            // Draw player car
            drawCar(player.x, player.y, player.width, player.height, '#00ff88', true);

            // Draw speed lines for effect
            if (speed > 100) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 10; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    const length = speed * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + length);
                    ctx.stroke();
                }
            }
        }

        function drawCar(x, y, width, height, color, isPlayer = false) {
            ctx.save();
            ctx.translate(x, y);

            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(-width/2 + 5, height/2, width, 10);

            // Car body
            ctx.fillStyle = color;
            ctx.fillRect(-width/2, -height/2, width, height);

            // Car highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(-width/2 + 5, -height/2 + 5, width - 10, height/3);

            // Windows
            ctx.fillStyle = 'rgba(0, 50, 100, 0.8)';
            ctx.fillRect(-width/2 + 8, -height/2 + height/3, width - 16, height/4);

            // Glow effect for player
            if (isPlayer) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(-width/2 - 2, -height/2 - 2, width + 4, height + 4);
            }

            ctx.restore();
        }

        function drawCoin(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // Coin glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#feca57';

            // Coin body
            ctx.fillStyle = '#feca57';
            ctx.beginPath();
            ctx.arc(0, 0, 15, 0, Math.PI * 2);
            ctx.fill();

            // Coin detail
            ctx.fillStyle = '#ff9f43';
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);
            ctx.fill();

            // Dollar sign
            ctx.fillStyle = '#feca57';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 0, 0);

            ctx.restore();
        }

        function checkCollision(a, b) {
            return a.x - a.width/2 < b.x + b.width/2 &&
                   a.x + a.width/2 > b.x - b.width/2 &&
                   a.y - a.height/2 < b.y + b.height/2 &&
                   a.y + a.height/2 > b.y - b.height/2;
        }

        function updateUI() {
            document.getElementById('distanceText').textContent = Math.floor(distance) + 'm';
            document.getElementById('scoreText').textContent = score;
            document.getElementById('coinsText').textContent = coins;
            document.getElementById('speedValue').textContent = Math.floor(speed);
        }

        function gameOver() {
            gameState = 'gameover';

            if (distance > bestDistance) {
                bestDistance = Math.floor(distance);
                localStorage.setItem('racerBest', bestDistance);
            }

            document.getElementById('finalDistance').textContent = Math.floor(distance) + 'm';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCoins').textContent = coins;
            document.getElementById('bestDistance').textContent = bestDistance + 'm';
            document.getElementById('gameOverScreen').classList.add('show');
            document.getElementById('instructions').classList.add('hide');
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.remove('show');
            startGame();
        }

        // Keyboard controls
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (gameState !== 'playing') return;

            // Hide instructions on first input
            document.getElementById('instructions').classList.add('hide');
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Update player position based on keys
        setInterval(() => {
            if (gameState !== 'playing') return;

            // Steering
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.lane = Math.max(0, player.lane - 0.1);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.lane = Math.min(4, player.lane + 0.1);
            }

            // Acceleration
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                targetSpeed = Math.min(200, targetSpeed + 2);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                targetSpeed = Math.max(30, targetSpeed - 3);
            }

            // Update player x position based on lane
            const targetX = roadX + player.lane * laneWidth + laneWidth / 2;
            player.x += (targetX - player.x) * 0.2;

        }, 1000 / 60);

        // Touch controls for mobile
        let touchStartX = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameState !== 'playing') return;

            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;

            if (diff > 5) {
                player.lane = Math.min(4, player.lane + 0.1);
            } else if (diff < -5) {
                player.lane = Math.max(0, player.lane - 0.1);
            }

            touchStartX = touchX;
            e.preventDefault();
        });

        // Initial draw
        ctx.fillStyle = '#0a0a1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
